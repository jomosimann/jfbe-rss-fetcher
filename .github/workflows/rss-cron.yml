name: Weekly RSS Fetch

on:
  schedule:
    - cron: "0 7 * * 1,4" # Every Monday at 07:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RSS processing
        run: |
          curl -sf -X POST "${{ secrets.VERCEL_URL }}/api/cron/rss" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
