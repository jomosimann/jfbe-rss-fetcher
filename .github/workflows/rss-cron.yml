name: Weekly RSS Fetch

on:
  schedule:
    - cron: "0 7 * * 1,4"
  workflow_dispatch:

jobs:
  fetch-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RSS processing
        run: |
          curl -sfL -X POST "${{ secrets.VERCEL_URL }}/api/cron/rss" -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
